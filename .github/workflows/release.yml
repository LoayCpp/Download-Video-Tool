name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore

      - name: Build Release
        run: msbuild YourProject.sln /p:Configuration=Release

      - name: Get commit message
        id: commit
        run: |
          echo "message=$(git log -1 --pretty=%B)" >> $env:GITHUB_OUTPUT

      - name: Generate version
        id: version
        shell: bash
        run: |
          if [[ "${{ steps.commit.outputs.message }}" == feat* ]]; then
            echo "version=v1.$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT
          else
            echo "version=v1.0.${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT
          fi

      - name: Build Inno Setup Installer
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" Setup.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          files: |
            Output\Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
